<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yukleme Tamamlandi</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #fffaf0;
      color: #17324d;
    }

    .card {
      width: min(480px, 100%);
      padding: 24px;
      border: 1px solid rgba(23, 50, 77, 0.14);
      border-radius: 20px;
      background: #fff;
      text-align: center;
      box-shadow: 0 18px 45px rgba(23, 50, 77, 0.12);
    }

    h1 {
      margin-top: 0;
    }

    p {
      line-height: 1.6;
      color: #5b7188;
    }

    button {
      min-height: 46px;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      background: #1f9aa5;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Yukleme Tamamlandi</h1>
    <p id="status">Portal bilgilendiriliyor...</p>
    <button type="button" id="close-button" hidden>Pencereyi kapat</button>
  </div>

  <script src="portal-config.js?v=20260408-3"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var requestId = params.get("requestId") || "";
      var payloadText = params.get("payload") || "";
      var portalOrigin = params.get("portalOrigin") || window.location.origin || "";
      var statusNode = document.getElementById("status");
      var closeButton = document.getElementById("close-button");

      try {
        var payload = JSON.parse(payloadText);
        window.__UPLOAD_PAYLOAD__ = payload;
        window.__UPLOAD_REQUEST_ID__ = requestId;
        window.__UPLOAD_PORTAL_ORIGIN__ = portalOrigin;
      } catch (error) {
        statusNode.textContent = "Yukleme verisi okunamadi. Bu pencereyi kapatip tekrar deneyin.";
        closeButton.hidden = false;
        closeButton.onclick = function() {
          window.close();
        };
        return;
      }
    })();
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const statusNode = document.getElementById("status");
    const closeButton = document.getElementById("close-button");
    const payload = window.__UPLOAD_PAYLOAD__ || {};
    const requestId = window.__UPLOAD_REQUEST_ID__;
    const portalOrigin = window.__UPLOAD_PORTAL_ORIGIN__ || window.location.origin;

    async function waitForCurrentUser(auth, timeoutMs = 12000) {
      return await new Promise((resolve, reject) => {
        const timeoutId = window.setTimeout(() => {
          unsubscribe();
          reject(new Error("Oturum bilgisi zamaninda alinamadi."));
        }, timeoutMs);

        const unsubscribe = onAuthStateChanged(
          auth,
          (user) => {
            window.clearTimeout(timeoutId);
            unsubscribe();
            resolve(user);
          },
          (error) => {
            window.clearTimeout(timeoutId);
            unsubscribe();
            reject(error);
          }
        );
      });
    }

    async function saveProjectRecordInFirestore(projectPayload, projectRequestId) {
      const firebaseConfig = window.PORTAL_CONFIG?.firebase?.config;
      if (!firebaseConfig || !firebaseConfig.apiKey) {
        throw new Error("Firebase ayarlari eksik.");
      }

      const app = initializeApp(firebaseConfig, "upload-callback-app");
      const auth = getAuth(app);
      const db = getFirestore(app);
      const currentUser = await waitForCurrentUser(auth);
      if (!currentUser) {
        throw new Error("Ogrenci oturumu bulunamadi.");
      }

      const profileRef = doc(db, "users", currentUser.uid);
      const profileSnapshot = await getDoc(profileRef);
      if (!profileSnapshot.exists()) {
        throw new Error("Ogrenci profili bulunamadi.");
      }

      const profile = profileSnapshot.data() || {};
      await setDoc(doc(db, "projects", projectRequestId), {
        requestId: String(projectRequestId || ""),
        userId: currentUser.uid,
        studentName: profile.name || projectPayload.studentName || currentUser.displayName || "Ogrenci",
        className: profile.className || projectPayload.className || "",
        email: profile.email || currentUser.email || projectPayload.email || "",
        teacherId: profile.assignedTeacherId || null,
        teacherName: profile.assignedTeacherName || "",
        teacherEmail: profile.assignedTeacherEmail || "",
        title: String(projectPayload.title || "").trim(),
        description: String(projectPayload.description || "").trim(),
        driveFileId: String(projectPayload.driveFileId || ""),
        driveFileUrl: String(projectPayload.driveFileUrl || ""),
        driveFileName: String(projectPayload.driveFileName || ""),
        mimeType: String(projectPayload.mimeType || ""),
        size: Number(projectPayload.size || 0),
        reviewText: "",
        reviewUpdatedAt: null,
        reviewUpdatedBy: null,
        reviewUpdatedByName: null,
        reviewUpdatedByRole: null,
        uploadedAt: serverTimestamp()
      }, { merge: true });
    }

    async function finalizeUpload() {
      payload.firestoreSaved = false;
      payload.firestoreSaveError = "";

      try {
        await saveProjectRecordInFirestore(payload, requestId);
        payload.firestoreSaved = true;
      } catch (error) {
        payload.firestoreSaveError = error instanceof Error ? error.message : String(error || "FIRESTORE_SAVE_FAILED");
      }

      localStorage.setItem("algoritmaUploadCallback:" + requestId, JSON.stringify(payload));
      if (window.opener) {
        window.opener.postMessage({
          type: "google-drive-upload-complete",
          requestId,
          payload
        }, portalOrigin);
      }

      statusNode.textContent = payload.firestoreSaved
        ? "Yukleme bilgisi portala ve Firebase'e kaydedildi. Bu pencere kapanabilir."
        : "Drive yuklemesi tamamlandi. Portal penceresi Firebase kaydini tamamlayacak.";
      closeButton.hidden = false;
      closeButton.onclick = () => window.close();

      setTimeout(() => {
        try {
          window.close();
        } catch (error) {}
      }, 500);
    }

    if (!requestId) {
      statusNode.textContent = "Portal ayarlari okunamadi. Bu pencereyi kapatip tekrar deneyin.";
      closeButton.hidden = false;
      closeButton.onclick = () => window.close();
    } else {
      finalizeUpload().catch((error) => {
        statusNode.textContent = error instanceof Error ? error.message : "Yukleme tamamlanamadi.";
        closeButton.hidden = false;
        closeButton.onclick = () => window.close();
      });
    }
  </script>
</body>
</html>
