<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yukleme Tamamlandi</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #fffaf0;
      color: #17324d;
    }

    .card {
      width: min(480px, 100%);
      padding: 24px;
      border: 1px solid rgba(23, 50, 77, 0.14);
      border-radius: 20px;
      background: #fff;
      text-align: center;
      box-shadow: 0 18px 45px rgba(23, 50, 77, 0.12);
    }

    h1 {
      margin-top: 0;
    }

    p {
      line-height: 1.6;
      color: #5b7188;
    }

    button {
      min-height: 46px;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      background: #1f9aa5;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Yukleme Tamamlandi</h1>
    <p id="status">Portal bilgilendiriliyor...</p>
    <button type="button" id="close-button" hidden>Pencereyi kapat</button>
  </div>

  <script src="portal-config.js?v=20260405-4"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var requestId = params.get("requestId") || "";
      var payloadText = params.get("payload") || "";
      var statusNode = document.getElementById("status");
      var closeButton = document.getElementById("close-button");

      try {
        var payload = JSON.parse(payloadText);
        window.__UPLOAD_PAYLOAD__ = payload;
        window.__UPLOAD_REQUEST_ID__ = requestId;
      } catch (error) {
        statusNode.textContent = "Yukleme verisi okunamadi. Bu pencereyi kapatip tekrar deneyin.";
        closeButton.hidden = false;
        closeButton.onclick = function() {
          window.close();
        };
        return;
      }
    })();
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const statusNode = document.getElementById("status");
    const closeButton = document.getElementById("close-button");
    const payload = window.__UPLOAD_PAYLOAD__;
    const requestId = window.__UPLOAD_REQUEST_ID__;
    const config = window.PORTAL_CONFIG;

    if (!payload || !requestId || !config?.firebase?.config?.apiKey) {
      statusNode.textContent = "Portal ayarlari okunamadi. Bu pencereyi kapatip tekrar deneyin.";
      closeButton.hidden = false;
      closeButton.onclick = () => window.close();
    } else {
      const app = initializeApp(config.firebase.config);
      const auth = getAuth(app);
      const db = getFirestore(app);

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          statusNode.textContent = "Portal oturumu bulunamadi. Ana sayfada giris yapip tekrar deneyin.";
          closeButton.hidden = false;
          closeButton.onclick = () => window.close();
          return;
        }

        try {
          await setDoc(doc(db, "projects", requestId), {
            requestId,
            userId: user.uid,
            studentName: payload.studentName || user.displayName || "Ogrenci",
            className: payload.className || "",
            email: payload.email || user.email || "",
            title: payload.title || payload.driveFileName || "Proje dosyasi",
            description: payload.description || "",
            driveFileId: payload.driveFileId || "",
            driveFileUrl: payload.driveFileUrl || "",
            driveFileName: payload.driveFileName || "",
            mimeType: payload.mimeType || "",
            size: Number(payload.size || 0),
            uploadedAt: serverTimestamp(),
            reviewText: "",
            reviewUpdatedAt: null,
            reviewUpdatedBy: null,
            reviewUpdatedByName: null
          }, { merge: true });

          localStorage.setItem("algoritmaUploadCallback:" + requestId, JSON.stringify(payload));
          if (window.opener) {
            window.opener.postMessage({
              type: "google-drive-upload-complete",
              requestId,
              payload
            }, window.location.origin);
          }

          statusNode.textContent = "Proje kaydi olusturuldu. Bu pencere kapanabilir.";
          closeButton.hidden = false;
          closeButton.onclick = () => window.close();

          setTimeout(() => {
            try {
              window.close();
            } catch (error) {}
          }, 500);
        } catch (error) {
          statusNode.textContent = "Firestore kaydi olusturulamadi. " + (error?.message || "");
          closeButton.hidden = false;
          closeButton.onclick = () => window.close();
        }
      });
    }
  </script>
</body>
</html>
